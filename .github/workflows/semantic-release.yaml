name: Semantic Release

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Release
        env:
          # Use a PAT/App token (GH_TOKEN) instead of the default GITHUB_TOKEN.
          # Tags pushed by the default token do not trigger other workflows (e.g. release.yaml),
          # so a personal access token or GitHub App token with `contents: write` is required.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # GITHUB_TOKEN is set to the same PAT for compatibility with semantic-release
          # plugins and third-party actions that read GITHUB_TOKEN instead of GH_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release
