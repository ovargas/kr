name: Semantic Release

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Release
        env:
          # Use a PAT instead of the default GITHUB_TOKEN so that the tag push
          # created by semantic-release triggers the Release workflow
          # (tags pushed by GITHUB_TOKEN do not fire push-tag workflow triggers).
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release
