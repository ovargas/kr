name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)
  workflow_dispatch:  # Allow manual runs for an existing tag (e.g. v0.1.0)

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          # Windows
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: windows
            goarch: arm64
            suffix: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X github.com/ovargas/kr/internal/version.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/ovargas/kr/internal/version.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X github.com/ovargas/kr/internal/version.Date=${DATE}"

          # Build main CLI tool (simple name, suffix only for Windows)
          go build -ldflags "${LDFLAGS}" -o kr${{ matrix.suffix }} ./cmd/kr

          # Build standalone plugins
          go build -ldflags "${LDFLAGS}" -o kr-gen-go${{ matrix.suffix }} ./cmd/kr-gen-go
          go build -ldflags "${LDFLAGS}" -o kr-gen-python${{ matrix.suffix }} ./cmd/kr-gen-python

      - name: Create archives
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PLATFORM=${{ matrix.goos }}-${{ matrix.goarch }}

          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Create zip for Windows (binaries have simple names with .exe)
            zip kr-${VERSION}-${PLATFORM}.zip \
              kr.exe \
              kr-gen-go.exe \
              kr-gen-python.exe
          else
            # Create tar.gz for Unix-like systems (binaries have simple names)
            tar -czvf kr-${VERSION}-${PLATFORM}.tar.gz \
              kr \
              kr-gen-go \
              kr-gen-python
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            kr-*.tar.gz
            kr-*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum kr-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/kr-*.tar.gz
            artifacts/kr-*.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
