{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.ProjectName}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">{{.ProjectName}}</a>
        <div class="nav-links">
            {{range .NavItems}}
            <a href="/{{.Name}}/" class="nav-link{{if .Active}} active{{end}}">{{.Name}}</a>
            {{end}}
        </div>
        <form action="/search" method="GET" class="search-form">
            <button type="button" class="search-toggle{{if .SearchCase}} active{{end}}" data-param="case" title="Case sensitive">Aa</button>
            <button type="button" class="search-toggle{{if .SearchWord}} active{{end}}" data-param="word" title="Match whole word">W</button>
            <button type="button" class="search-toggle{{if .SearchRegex}} active{{end}}" data-param="regex" title="Use regular expression">.*</button>
            <input type="hidden" name="case" value="{{if .SearchCase}}1{{else}}0{{end}}">
            <input type="hidden" name="word" value="{{if .SearchWord}}1{{else}}0{{end}}">
            <input type="hidden" name="regex" value="{{if .SearchRegex}}1{{else}}0{{end}}">
            <input type="text" name="q" class="search-input" placeholder="Search..." value="{{.SearchQuery}}" autocomplete="off">
        </form>
    </nav>
    <main class="content">
        {{template "content" .}}
    </main>
    <script src="/static/main.js"></script>
</body>
</html>{{end}}
