{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kr</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">kr</a>
        <div class="nav-links">
            {{range .NavItems}}
            <a href="/{{.Name}}/" class="nav-link{{if .Active}} active{{end}}">{{.Name}}</a>
            {{end}}
        </div>
    </nav>
    <main class="content">
        {{template "content" .}}
    </main>
    <script src="/static/main.js"></script>
</body>
</html>{{end}}
