{{define "content"}}
<h1>{{.FolderName}}</h1>
{{if .Files}}
<ul class="file-list">
    {{range .Files}}
    <li>
        <a href="/{{$.FolderName}}/{{.Name}}">{{if .Title}}{{.Title}}{{else}}{{.Name}}{{end}}</a>
        {{if .Excerpt}}<p class="file-excerpt">{{.Excerpt}}</p>{{end}}
        {{if .Title}}<span class="file-name">{{.Name}}</span>{{end}}
    </li>
    {{end}}
</ul>
{{else}}
<p class="empty-state">No documents in this folder</p>
{{end}}
{{end}}
